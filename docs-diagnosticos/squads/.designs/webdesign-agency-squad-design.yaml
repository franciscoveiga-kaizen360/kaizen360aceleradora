# squad-design.yaml
# Web Design Agency Squad — Nível Mundial
# Gerado por: @squad-creator (Craft)
# Referências: Clay, AKQA, Code & Theory

squad:
  name: webdesign-agency-squad
  description: "Squad de web design de nível mundial, cobrindo todo o ciclo de criação de sites de alta performance. Design para humanos em uma web AI-first."
  domain: web-design-agency
  philosophy: "Sites artesanalmente criados com personalidade única, que conectam emocionalmente, convertem e se destacam."
  site_types:
    - institucionais
    - landing-pages-alta-conversao
    - e-commerces
    - blogs
    - portfolios
    - saas
    - marketplaces
    - web-apps
    - sites-imersivos-premiados

analysis:
  entities:
    - Cliente
    - Brief
    - Projeto
    - Website
    - Design System
    - Design Tokens
    - Componentes
    - Personas
    - Wireframe
    - Protótipo
    - Sitemap
    - Brand Guidelines
    - Animações
    - Elementos 3D
    - Core Web Vitals
    - Copy
    - CTAs
    - Conversão
    - Sprint
    - Backlog

  workflows:
    - discovery-briefing
    - brand-strategy
    - ux-research
    - ux-strategy
    - ui-design
    - motion-design
    - 3d-immersive
    - copywriting
    - frontend-development
    - backend-development
    - ai-integration
    - seo-geo-optimization
    - performance-engineering
    - accessibility-audit
    - qa-testing
    - devops-deploy
    - sprint-ceremonies
    - client-communication

  integrations:
    - Figma
    - GSAP
    - Framer Motion
    - Lottie
    - Three.js
    - Spline
    - WebGL
    - React
    - Next.js
    - TypeScript
    - Tailwind CSS
    - WebAssembly
    - Node.js
    - Python
    - PostgreSQL
    - MongoDB
    - Sanity
    - Strapi
    - Contentful
    - Vercel
    - AWS
    - Netlify
    - Cloudflare
    - GA4
    - Hotjar
    - Google Search Console

  stakeholders:
    - Head of Digital
    - Product Owner
    - Scrum Master
    - Project Manager
    - Creative Director
    - UX Researcher
    - UX Strategist
    - UI Designer
    - Motion Designer
    - 3D Designer
    - Copywriter
    - Frontend Developer
    - Backend Developer
    - AI Specialist
    - SEO/GEO Specialist
    - Performance Engineer
    - Accessibility Specialist
    - QA/CRO Specialist
    - DevOps Engineer
    - Brand Strategist
    - Cliente

recommendations:
  template: custom
  config_mode: extend

  agents:
    # CAMADA DE LIDERANÇA
    - id: aios-master
      role: "Head of Digital — visão estratégica, decisões de negócio, posicionamento de mercado, garantia de excelência"
      layer: leadership
      commands:
        - define-project-scope
        - set-creative-vision
        - review-final-delivery
        - market-positioning
      confidence: 0.97
      user_added: false
      user_modified: false

    - id: product-owner
      role: "Voz do cliente dentro do squad — tradução de necessidades em requisitos, priorização de backlog, critérios de aceitação"
      layer: leadership
      commands:
        - create-product-brief
        - manage-backlog
        - define-acceptance-criteria
        - validate-delivery
      confidence: 0.97
      user_added: false
      user_modified: false

    - id: scrum-master
      role: "Facilitação do fluxo ágil — remoção de obstáculos, cerimônias, melhoria contínua dos processos"
      layer: leadership
      commands:
        - run-sprint-planning
        - run-daily-standup
        - run-sprint-review
        - run-retrospective
        - remove-blockers
      confidence: 0.97
      user_added: false
      user_modified: false

    - id: project-manager
      role: "Gestão de cronograma, budget, recursos, riscos e comunicação formal com cliente"
      layer: leadership
      commands:
        - create-project-plan
        - track-progress
        - manage-resources
        - risk-management
        - client-reporting
      confidence: 0.97
      user_added: false
      user_modified: false

